name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package="padsound-v${version}-linux-x86_64"
          mkdir -p "dist/${package}"
          cp target/release/padsound "dist/${package}/"
          cp README.md LICENSE padsound.example.toml "dist/${package}/"
          cp -R example "dist/${package}/example"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.tar.gz
